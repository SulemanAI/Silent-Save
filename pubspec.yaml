name: silentsave
description: "A personal message archive app that captures WhatsApp and Instagram notifications for offline storage."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Date formatting
  intl: ^0.18.1
  
  # Encryption
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  
  # File paths
  path_provider: ^2.1.0
  
  # Permissions
  permission_handler: ^11.0.1

  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Launcher icons
  flutter_launcher_icons: ^0.13.1

# Launcher icon configuration
flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
